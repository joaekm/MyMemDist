# MyMemory Klient Configuration
# Cloud-only sedan #132/#180. Lokala daemons (Ingestion/Enrichment/Dreamer)
# körs på Hetzner-servern. Klienten kör bara collectors + transcriber +
# uploader-daemon.
#
# Server-side config: config/my_mem_server_config.template.yaml

version: "__APP_VERSION__"

# --- CLOUD-ANSLUTNING ---
cloud:
  # Bas-URL till MyMemory-servern (utan trailing slash).
  api_url: "__CLOUD_API_URL__"

  # TLS-verifiering. false så länge servern kör self-signed cert.
  # Sätt till true när domän + Let's Encrypt är på plats.
  verify_tls: false

  # PAT-källor (i prioritetsordning):
  #   1. MYMEMORY_PAT env var
  #   2. macOS Keychain (service=MyMemory, account=uploader_pat)
  #   3. Detta config-fält (klartext, undvik i produktion)
  pat: ""

  # SQLite state för uploader-daemon.
  uploader_state_db: "~/Library/Application Support/MyMemory/uploader_state.db"

# --- SYSTEMINSTÄLLNINGAR ---
system:
  product_name: "Digitalist Företagsminne"
  timezone: "Europe/Stockholm"
  locale: "sv_SE"

# --- ÄGARE & PROFIL ---
owner:
  id: "__OWNER_ID__"
  profile:
    full_name: "__OWNER_NAME__"
    role: "__OWNER_ROLE__"
    organization: "__OWNER_ORG__"
    location: "__OWNER_LOCATION__"

    # Nyckelkompetenser (hjälper AI:n att välja nivå på svaret)
    skills:
      - "Ändra denna lista"

# --- SÖKVÄGAR (klient-lokala) ---
paths:
  # Inkommande filer (drop-zone)
  drop_folder: "~/MyMemory/MemoryDrop"
  downloads_folder: "~/Downloads"

  # Assets — collectors och transcriber skriver hit, uploader plockar
  asset_store: "~/MyMemory/Assets"
  asset_documents: "~/MyMemory/Assets/Documents"
  asset_recordings: "~/MyMemory/Assets/Recordings"
  asset_transcripts: "~/MyMemory/Assets/Transcripts"
  asset_slack: "~/MyMemory/Assets/Slack"
  asset_calendar: "~/MyMemory/Assets/Calendar"
  asset_mail: "~/MyMemory/Assets/Mail"
  asset_ai_generated: "~/MyMemory/Assets/AIGenerated"
  asset_failed: "~/MyMemory/Assets/Failed"

  # Runtime
  pending_drops: "~/Library/Application Support/MyMemory/PendingDrops"

# --- LOGGNING ---
logging:
  system_log: "~/Library/Logs/MyMemory/system.log"
  log_level: "INFO"

# --- AI ENGINE (klient-side: bara Gemini för transkribering) ---
# LLM för entity extraction, enrichment, search etc. körs server-side
# och konfigureras i my_mem_server_config.yaml.
ai_engine:
  transcription_provider: "gemini"

  gemini:
    api_key: "__GEMINI_API_KEY__"

  models:
    model_transcribe: "models/gemini-2.5-flash"

  gemini_poll_interval_seconds: 1

# --- VALIDATION ---
validation:
  min_year: 2015
  system_date_override: null

# --- FILTYPER ---
processing:
  document_extensions:
    - .pdf
    - .docx
    - .txt
    - .md
    - .json
    - .xls
    - .xlsx
    - .csv

  audio_extensions:
    - .mp3
    - .wav
    - .m4a
    - .mp4
    - .aac
    - .flac
    - .ogg
    - .mov

# --- COLLECTORS ---
collectors:
  slack:
    page_size: 200

  rode:
    volume_prefix: "WirelessPRO"
    poll_interval_seconds: 30
    ffmpeg_bitrate: "128k"
    state_dir: "~/MyMemory/Assets/.rode_state"

# --- SLACK INTEGRATION (valfritt) ---
slack:
  enabled: true
  bot_token: "__SLACK_BOT_TOKEN__"
  channels: []
  history_days: 7

# --- GOOGLE INTEGRATION (valfritt) ---
google:
  credentials_path: "~/MyMemory/Settings/Credentials/client_secret.json"
  token_path: "~/MyMemory/Settings/Credentials/token.json"
  scopes:
    - "https://www.googleapis.com/auth/gmail.readonly"
    - "https://www.googleapis.com/auth/calendar.readonly"
  gmail:
    enabled: true
    history_days: 7
    target_label: "__GMAIL_LABEL__"
  calendar:
    enabled: true
    history_days: 30

# --- MEETING TRANSCRIBER ---
meeting_transcriber:
  icecast_url: "http://localhost:8000/meeting"
  buffer_seconds: 30
  buffer_dir: "~/MyMemory/MeetingBuffer"

# --- RICH TRANSCRIBER ---
transcriber:
  enabled: true
  chunk_size_bytes: 10000000
  chunk_overlap_seconds: 5
  normalize_audio: false
  calendar_window_minutes: 10
  part_preview_limit: 500
  max_file_workers: 2
  max_chunk_workers: 10

# --- FILE RETRIEVER (DropZone → Assets) ---
file_retriever:
  enabled: true

# --- SIGNAL FEED (peer-to-peer, valfritt) ---
signal_feed:
  enabled: false
  port: 8100
  broker_url: ""
  intent_peer_secret: ""
  heartbeat_interval_seconds: 300
  smoketrail_clusters: 12
  feed_cache_ttl_seconds: 3600

# --- DESKTOP MENUBAR ---
desktop:
  host: "localhost"
  port: 8765
  llm_provider: "gemini"
  max_tool_calls: 15
  timeout_seconds: 30
