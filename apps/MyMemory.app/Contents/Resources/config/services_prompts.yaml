# DFM Prompt-bibliotek (services_prompts.yaml)

# --- Transformations-agenten (Ljud/Video) ---
transcriber:

  # Meeting Transcriber (live stream → text chunks)
  meeting_transcribe: |
    Transkribera detta ljudklipp på svenska. Skriv ENDAST vad som sägs, inga kommentarer.

  # PASS 1: Rådatat (Ljud -> Text)
  pass1_raw: |
    Din uppgift är att transkribera ljudfilen ordagrant till svenska.

    INSTRUKTIONER:
    1. Skriv exakt vad som sägs, ord för ord.
    2. Använd generiska etiketter för talare: "Talare 1:", "Talare 2:", etc.
    3. Försök INTE gissa vem som är vem baserat på rösten.
    4. Gör INGA sammanfattningar.
    5. Utelämna talljud som "mm", "uh", "eh", "öh" och liknande.

    FORMAT (följ exakt):
    - En rad per replik, talarbytet markerar ny rad.
    - Inga blankrader mellan repliker.
    - Inga tidsstämplar.
    - Ingen markdown-formatering (ingen bold, ingen kursiv, inga rubriker).
    - Formatet ska vara: "Talare N: text"

    EXEMPEL:
    Talare 1: Ja, det stämmer.
    Talare 2: Okej, men hur tänker du kring det här med leveransen?
    Talare 1: Vi siktar på att vara klara i mars.

  # STEG 4: Berikningsfrågor (transkribering → söktermer)
  enrichment_queries: |
    <uppgift>
    Extrahera sökbara entiteter och nyckelämnen ur transkriberingen nedan.
    </uppgift>

    <kalenderkontext>
    {calendar_info}
    </kalenderkontext>

    <transkribering max_tecken="{context_limit}">
    {transcript_text}
    </transkribering>

    <regler>
    - Extrahera ENBART namn/termer som FAKTISKT NÄMNS i texten.
    - Hitta INTE PÅ entiteter som inte förekommer.
    - person_queries: fullständiga namn om möjligt, annars förnamn.
    - org_queries: officiella organisationsnamn, inte förkortningar.
    - project_queries: projekt, produkter, initiativ, system.
    - semantic_queries: 2-3 ord per fråga, beskriver ämne (inte namn).
    </regler>

    <format>
    Returnera ENBART JSON, ingen annan text:
    {{
      "person_queries": ["Förnamn Efternamn", "Förnamn"],
      "org_queries": ["Organisationsnamn"],
      "project_queries": ["Projektnamn"],
      "semantic_queries": ["ämne i 2-3 ord", "annat ämne"]
    }}
    </format>

  # STEG 5: Kontext-destillering (rådata → ContextPackage)
  context_distill: |
    <uppgift>
    Destillera nedanstående rådata till en strukturerad kontextbeskrivning.
    </uppgift>

    <rådata>
    {raw_data}
    </rådata>

    <regler>
    - Besvara EXAKT de sex fälten nedan. Inga extra fält.
    - when: datum, tid, duration. Format: "YYYY-MM-DD HH:MM, duration N min".
    - who: lista med FULLSTÄNDIGA namn. Inga titlar här.
    - affiliations: "Namn: Organisation, Roll" per person.
    - topic: EN mening. Vad mötet handlar om konkret.
    - context: 1-2 meningar. Bakgrund, projekt, relation mellan parterna.
    - relations_summary: 2-3 meningar. HUR personerna relaterar till varandra
      — roller, hierarki, kund/leverantör. INTE att de "diskuterade" något.
    - INGA värderande ord ("intressant", "givande", "viktig").
    - INGA meta-fraser ("I detta möte diskuterades...", "Deltagarna tog upp...").
    </regler>

    <format>
    Returnera ENBART JSON, ingen annan text:
    {{
      "when": "2025-12-11 14:00, duration 28 min",
      "who": ["Förnamn Efternamn", "Förnamn Efternamn"],
      "affiliations": ["Namn: Organisation, Roll"],
      "topic": "Konkret ämne i en mening",
      "context": "Bakgrund och projektkontext.",
      "relations_summary": "Hur personerna relaterar professionellt."
    }}
    </format>

  # STEG 6: Speaker-mapping (per chunk)
  speaker_mapping: |
    <uppgift>
    Mappa generiska talar-etiketter ("Talare 1", "Talare 2" osv.) till
    verkliga namn baserat på bevis i transkriberingen.
    </uppgift>

    <deltagare>
    {participants}
    </deltagare>

    <roller>
    {affiliations}
    </roller>

    <transkribering>
    {transcript_text}
    </transkribering>

    <regler>
    - SJÄLVPRESENTATION: "jag heter X", "X heter jag" → använd det namnet.
    - TILLTAL: Någon säger "Hej Anna" och en talare svarar → talaren ÄR Anna.
    - ROLLMATCHNING: Om talaren diskuterar ämnen som matchar en persons roll
      i <roller>, det ÄR ett indicium men INTE tillräckligt ensamt.
    - VALIDERING: Om <deltagare> INTE matchar innehållet (fel företag, fel
      kontext, fel ämne), returnera tom mapping {{}}.
    - SÄKERHETSKRAV: Mappa ENBART vid tydligt bevis. Gissning är FÖRBJUDET.
    - Tom mapping {{}} är ALLTID bättre än felaktig mapping.
    - Använd EXAKT namnformen från <deltagare>-listan.
    </regler>

    <format>
    Returnera ENBART JSON, ingen annan text:
    {{"Talare 1": "Förnamn Efternamn", "Talare 2": "Förnamn Efternamn"}}
    Tom om osäker: {{}}
    </format>

  # STEG 7: Delstrukturering (chunks → parts med metadata)
  part_structuring: |
    <uppgift>
    Strukturera mötets {num_parts} delar med titel, ingress, talare och ämnen.
    </uppgift>

    <kontext>
    Deltagare: {participants}
    Ämne: {topic}
    </kontext>

    <delar>
    {parts_json}
    </delar>

    <regler>
    - title: Kort, beskrivande. MAX 8 ord.
    - ingress: Vilka BESLUT eller FAKTA framkom? Skriv VAD som sades.
      FÖRBJUDET: "I denna del diskuterar deltagarna...", "Här tar man upp...",
      "Deltagarna diskuterade...". Skriv konkret, inte meta.
    - speakers: ENBART namn från <kontext>-deltagarlistan.
    - topics: 1-4 nyckelord per del.
    - Returnera EXAKT {num_parts} element.
    </regler>

    <format>
    Returnera ENBART JSON-array, ingen annan text:
    [
      {{
        "id": 1,
        "title": "Kort titel",
        "ingress": "Konkret sammanfattning av vad som framkom.",
        "speakers": ["Förnamn Efternamn"],
        "topics": ["ämne"]
      }}
    ]
    </format>
    

  # PASS 2: Berikning & Analys (Text + Kontext -> Insikt)
  # OBS: Returnerar INTE full transkription (token-limit). Python applicerar speaker_map på raw_transcript.
  pass2_enriched: |
    {context_injection}

    Du har fått en rå transkription av ett möte eller en inspelning. Din uppgift är att analysera och extrahera metadata.

    UTFÖR FÖLJANDE STEG:

    STEG 1: KVALITETSKONTROLL
    Analysera om råtexten är användbar.
    Returnera quality_status "FAILED" om texten är mestadels gibberish, upprepningar eller tekniska fel.

    STEG 2: TALARIDENTIFIERING (Om quality_status är "OK")
    Identifiera vilka verkliga personer som motsvarar "Talare 1", "Talare 2" etc.
    Använd "MÖTESKONTEXT" och "KÄNDA TALARE" från kontexten.

    Skapa en speaker_map som mappar generiska etiketter till riktiga namn:
    - Nyckeln är EXAKT etiketten från råtranskriptet (t.ex. "Talare 1:")
    - Värdet är det identifierade namnet (t.ex. "Anna Andersson:")
    - Om du inte kan identifiera en talare, utelämna den från mappen.

    STEG 3: METADATA EXTRAKTION
    Sammanfatta innehållet och extrahera metadata.

    - Titel: Om kontext finns (t.ex. "Budgetmöte"), använd den. Annars, skapa en kort, beskrivande titel baserat på innehållet.
    - Plats: Om kontext/innehåll nämner plats (t.ex. "Teams", "Konferensrummet"), ange det. Annars "Okänd".
    - Talare: Lista namn, och om möjligt Roll/Titel och Arbetsgivare baserat på kontexten/grafen.

    RETURNERA EXAKT DENNA JSON-STRUKTUR:
    {
      "quality_status": "OK" eller "FAILED",
      "failure_reason": "Endast vid FAILED",
      "title": "Kort beskrivande titel",
      "location": "Plats eller Okänd",
      "speaker_map": {"Talare 1:": "Anna Andersson:", "Talare 2:": "Erik Svensson:"},
      "summary": "Kortfattad sammanfattning av mötet",
      "speakers_detailed": [
        {"name": "Namn Efternamn", "role": "Titel/Roll", "org": "Organisation"}
      ],
      "keywords": ["tag1", "tag2"],
      "entities": ["Personer", "System", "Projekt"]
    }

# --- Doc Converter (Textfiler/Dokument) ---
doc_converter:
  doc_summary_prompt: |
      Analysera detta dokument. Skriv för MASKINELL SÖKNING, inte mänsklig läsning.
      Inga inledningar, inga värderingar, inga fyllnadsord. Bara fakta.

      1. context_summary: Vad handlar dokumentet om? Fakta-statement.
         - FÖRBJUDET: "En intensiv dag...", "Detta dokument beskriver...", "En omfattande..."
         - BRA: "Tilldelningsbeslut ADDA upphandling AI-plattform. Crayon vann. 2026-03-16."
         - BRA: "Kvartalsrapport Q1 Digitalist. Omsättning 12.3 MSEK, EBITDA -0.8 MSEK."
         - Om DOKUMENTÄGARE anges: Skriv ur ägarens perspektiv utan att nämna ägaren.
      2. relations_summary: Vilka entiteter kopplas ihop och hur? Kompakt.
         - Inkludera INTE dokumentägaren.
         - BRA: "Crayon Sweden vann upphandlingen. Digitalist och Chas deltog som anbudsgivare."
      3. document_keywords: Sökord för textsökning. Minst 5, max 10.

      TEXT:
      {text}

      RETURNERA JSON:
      {{
        "context_summary": "...",
        "relations_summary": "...",
        "document_keywords": ["nyckelord1", "nyckelord2", "viktigt begrepp"]
      }}

  strict_entity_extraction: |
    Strukturera given text till noder och relationer enligt aktivt taxonomi-schema.

    NODTYPER:
    {node_types_context}

    RELATIONSTYPER:
    {edge_types_context}

    KÄLL-KONTEXT:
    {known_entities_context}

    REGLER:
    - Skapa endast nodtyper och relationstyper från listorna ovan.
    - Property-värden: följ description + type + enum-constraint för respektive property.
    - Properties markerade "*" är required.
    - Skapa endast relationer enligt allowed source→target. Övriga kombinationer är förbjudna.
    - confidence är float 0.0-1.0. Hög (0.8+) = tydlig schema-match. Låg (<0.3) = generisk/trivial.
    - Där edge-schemat deklarerar relation_context som property: inkludera den — en mening om vad dokumentet säger om relationen (händelse/beslut/förändring). Om schemat inte deklarerar den: utelämna.
    - Om en entitet matchar en anchor som bifogats separat, återanvänd dess uuid exakt.

    OUTPUT-FORMAT (JSON):
    {{
      "nodes": [ {{ "name": "<name>", "type": "<nodtyp>", "confidence": <float>, "<prop>": "<värde>", ... }}, ... ],
      "edges": [ {{ "source": "<name>", "target": "<name>", "type": "<reltyp>", "confidence": <float>, "relation_context": "<sats>", "<prop>": "<värde>", ... }}, ... ]
    }}

    TEXT:
    "{text_chunk}"

  # --- Source type-specifika kontextinstruktioner ---
  # Refereras via prompt_key i graph_schema_template.json source_type_profiles

  source_context_email: |
    KONTEXT: Detta är en e-posttråd. Avsändare (Från) och mottagare (Till/CC) är viktiga Person-noder.
    E-postsignaturer innehåller ofta jobbtitlar, telefonnummer och organisationsnamn — extrahera dessa som properties.
    Använd e-postdomäner för att identifiera organisationer.

  source_context_document: |
    KONTEXT: Detta är ett formellt dokument (avtal, rapport, offert, specifikation).
    Fokusera på AFFÄRSENTITETER: personer, organisationer, projekt och deras relationer.
    IGNORERA tekniska implementationsdetaljer: kodmoduler, ramverk, bibliotek, UI-komponenter, API-endpoints, databastabeller.
    Om dokumentet innehåller org_number, budget_value eller contract_id — extrahera dem som properties.

  source_context_calendar: |
    KONTEXT: Detta är en kalenderexport med händelser.
    Events är de primära entiteterna. Skapa INTE nya Person-noder — deltagare matchas mot befintlig graf.
    Skapa INTE ATTENDED-edges — dessa hanteras av deterministisk post-processing.
    Fokusera på att extrahera Event-properties (name, start_time, end_time, location) och eventuella organisationer eller projekt som nämns i titel eller beskrivning.

  source_context_slack: |
    KONTEXT: Detta är en Slack-konversation. Formatet är ofta 'Namn: Meddelande'.
    Avsändare är starka Person-kandidater — Slack-profiler har fullständiga namn.
    Slack-kanaler (#kanalnamn) är INTE entiteter — ignorera dem.
    Konversationsspråk innehåller sällan formella relationer — var konservativ med edges.

  source_context_transcript: |
    KONTEXT: Detta är ett mötestranskript. Det är BRUSIGT men värdefullt för KONTEXT om kända entiteter.
    Din PRIMÄRA uppgift är att identifiera BEFINTLIGA entiteter som nämns i samtalet — personer, organisationer, projekt — så att de kan LÄNKAS till sina grafnoder och berikas med kontext.
    Skapa INGA nya entiteter. Talare använder ofta bara förnamn, förkortningar eller informella referenser.
    Lägg den rika kontexten — beslut, diskussioner, åsikter, åtgärdspunkter — i relation_context på edges.
    Ignorera: utfyllnadsord, småprat, teknisk jargong som inte handlar om affärsentiteter.

  entity_critic: |
    Du är en strikt kvalitetsgranskare för Knowledge Graph-entiteter.

    Granska listan nedan och FILTRERA BORT entiteter som är:
    1. **Brus** - Generiska termer, verb, adjektiv, systemtermer
    2. **Felkategoriserade** - Typ matchar inte definitionen nedan
    3. **Dubbletter** - Varianter av samma entitet

    === TYPDEFINITIONER (från schema) ===
    {type_definitions}

    === ENTITETER ATT GRANSKA ===
    {entities_json}

    Returnera JSON:
    {{
      "approved": [{{"name": "...", "type": "...", "reason": "kort motivering"}}],
      "rejected": [{{"name": "...", "type": "...", "reason": "varför avvisad"}}]
    }}

# --- Enrichment (Property-berikning, fas 2 i pipeline) ---
enrichment:
  triage_prompt: |
    ## UPPGIFT: TRIAGE

    Bedöm om nya observationer väsentligt ändrar bilden av en entitet.

    ### NUVARANDE BESKRIVNING
    {context_summary}

    ### NYA OBSERVATIONER (sedan senaste berikning)
    {new_entries}

    ### FRÅGA
    Ändrar de nya observationerna bilden av entiteten väsentligt?
    Svara EXAKT "JA" eller "NEJ".

    - JA: Om ny roll, nytt sammanhang, ny relation, korrigering av fel, eller annan signifikant förändring
    - NEJ: Om observationerna bekräftar redan känd information eller handlar om triviala/tillfälliga händelser

  consolidation_prompt: |
    Du är en taxonomi-expert. Din uppgift är att kategorisera NYA noder under rätt masternode.
    
    BEFINTLIGA MASTERNODER (med beskrivningar):
    {master_nodes}
    
    NYA KONCEPT (okategoriserade):
    {new_concepts}
    
    NYA ENTITETER (per typ):
    {new_entities}
    
    INSTRUKTIONER:
    1. Placera varje nytt koncept under den MEST passande masternoden
    2. Använd EXAKT nodnamn från BEFINTLIGA MASTERNODER ovan som nycklar
    3. Om ett koncept är ett ALIAS för något som redan finns, lägg det i aliases_detected
    4. Var konsekvent - liknande koncept ska hamna under samma masternode
    5. VARJE koncept MÅSTE placeras under en masternode - ingen får utelämnas
    
    RETURNERA ENDAST GILTIG JSON. Exempel på korrekt format:
    {"Händelser": ["Sprint review", "Standup"], "Teknologier": ["Kubernetes"], "Person": ["Anna"], "aliases_detected": [{"alias": "K8s", "canonical": "Kubernetes", "confidence": "high"}]}  # noqa: SD — prompt example
    
    Nycklar MÅSTE vara exakta nodnamn från BEFINTLIGA MASTERNODER. Inkludera INTE noder utan nya koncept.

  structural_analysis: |
    ANALYSERA om denna nod bör delas (SPLIT), döpas om (RENAME), kategoriseras om (RE-CATEGORIZE) eller raderas (DELETE).

    NOD: {id} ({type})

    SCHEMA-REGEL FÖR "{type}":
    {node_type_description}

    KONTEXT (context_summary + relation_context):
    {context_list}

    TILLÅTNA TYPER (från taxonomi):
    {taxonomy_nodes}

    KRITERIER:
    - SPLIT: Om kontexten innehåller distinkt olika kluster (t.ex. olika personer med samma namn, eller ett ord som betyder två helt olika saker).
    - RENAME: Om ID:t är svagt (UUID, "Talare 1", "Fil_X") men kontexten innehåller ett tydligt egennamn.
    - RE-CATEGORIZE: Om kontexten BRYTER mot SCHEMA-REGELN ovan (t.ex. tekniska moduler som felaktigt klassats som "Project").  # noqa: SD — illustrative example
    - DELETE: Om noden är brus (stoppord, verb, meningslös text), saknar substans, eller bryter mot schema-regeln utan möjlig omkategorisering.
    - KEEP: Om noden är stabil och korrekt enligt schema-regeln.
    
    BEDÖMNING:
    Ange 'confidence' (0.0 - 1.0). Var konservativ. 1.0 = Helt säker. 0.5 = Gissning.
    
    JSON:
    {{
      "action": "SPLIT" | "RENAME" | "RE-CATEGORIZE" | "DELETE" | "KEEP",
      "confidence": 0.0,
      "reason": "Motivering",
      "new_name": "Sträng" (vid RENAME),
      "new_type": "Sträng" (vid RE-CATEGORIZE),
      "split_clusters": [ {{"name": "Namn", "context_indices": [0, 2]}} ] (vid SPLIT)
    }}

  semantic_update: |
    FÖRÄDLA metadata för "{filename}". Skriv för MASKINELL SÖKNING — kompakt, exakt, inga fyllnadsord.

    === NUVARANDE METADATA ===
    Context: {current_context}
    Relations: {current_relations}
    Keywords: {current_keywords}

    === NY GRAF-INSIKT ===
    {graph_context}

    === INSTRUKTION ===
    1. Behåll kärnan i nuvarande metadata.
    2. Ersätt vaga referenser med exakta namn från grafen ("ett projekt" -> "Adda PoC").
    3. context_summary: Fakta-statement. FÖRBJUDET: "En intensiv...", "Detta dokument...", narrativa inledningar.
    4. relations_summary: Vilka entiteter kopplas ihop och hur? Kompakt.
    5. Om DOKUMENTÄGARE: Skriv ur ägarens perspektiv utan att nämna ägaren.

    JSON:
    {{
      "context_summary": "...",
      "relations_summary": "...",
      "document_keywords": ["ord1", "ord2"]
    }}

# --- Entity Resolver (Dreamer: Dubblett-jakt) ---
entity_resolver:
  entity_resolution_prompt: |
    Du är en expert på Identity Resolution. Din uppgift är att avgöra om två noder (Node A och Node B) representerar SAMMA verkliga entitet.

    NODE A (Kandidat):
    {node_a_json}

    NODE B (Matchningsobjekt):
    {node_b_json}

    INSTRUKTIONER:
    1. Jämför namn, alias, typ och kontext.
    2. Ta hänsyn till stavfel, smeknamn (Jocke/Joakim) och namnvariationer (AB/Aktiebolag).
    3. Titta noga på 'context_keywords' om de finns - pekar de på samma roll/område?
    4. Om namnen är lika men kontexten är helt olika (t.ex. Jocke på IT vs Jocke på Sälj), är det INTE en match.
    
    BEDÖMNING:
    Returnera en JSON med:
    - "decision": "MERGE" (om det är samma entitet), "IGNORE" (om olika eller osäkert).
    - "confidence": 0.0 - 1.0 (för MERGE, måste vara >= 0.9 för att godkännas)
    - "reason": Kort förklaring.

    RETURNERA ENDAST JSON:
    {{
      "decision": "MERGE",
      "confidence": 0.95,
      "reason": "Namnen är identiska och båda har kontexten 'IT-chef'."
    }}

  context_pruning_prompt: |
    Du ska städa upp en lista med nyckelord för en entitet.
    Ta bort dubbletter, synonymer och irrelevanta ord. Behåll de mest beskrivande.

    LISTA:
    {keywords}

    RETURNERA JSON:
    {{
      "pruned_keywords": ["ord1", "ord2"]
    }}

  enrichment_prompt: |
    ## UPPGIFT: BERIKA (Steg 1 av 2)

    Du har fått källtext-kontext (originaltext från dokument) och berörda entiteter/relationer.

    ### VIKTIGT: BERIKA ALLA ENTITETER DU KAN
    Du är INTE begränsad till att bara berika de listade entiteterna.
    Om du i dokumenten hittar information som kan berika NÅGON entitet du ser
    (inklusive de som bara nämns som grannar), gör det.

    Titta särskilt på:
    - Entiteter med "SAKNAS"-fält som du kan fylla från dokumentkontext
    - Entiteter med "Context: TOM" där dokumenten innehåller relevanta detaljer
    - Grannar som nämns med detaljer i dokumenten men som har tomma properties

    ### REGLER
    - Returnera BARA NYA eller ÄNDRADE properties. ALDRIG system-properties.
    - Enum-värden MÅSTE matcha schemat EXAKT. Hitta inte på egna värden.
    - Gissa inte — om du inte kan härleda med rimlig säkerhet, hoppa över.
    - confidence < 0.6 = inkludera inte.
    - aliases: Returnera HELA listan (befintliga + nya) om du lägger till alias.

    ### UPPGIFTER

    1. **BERIKA NODER** — Fyll saknade properties från dokumentkontext + grannskap.
       Gäller ALLA entiteter du ser, inte bara de som listats under "BERÖRDA ENTITETER".
       **context_summary**: Fakta-statement om vem/vad detta ÄR. Format: [Namn] [roll/typ] [organisation].
       FÖRBJUDET: "En erfaren...", "En välkänd...", narrativa beskrivningar.
       BRA: "Joakim Ekman, VD Digitalist Group." / "Adda, inköpscentral för offentlig sektor."
       Returnera som updated_properties: {"context_summary": "..."}
       Beskriv identitet, inte händelser. Om context_summary redan finns och är korrekt, hoppa över.
    2. **BERIKA EDGES** — Fyll saknade edge-properties (duration_minutes, job_title, etc).
       OBS: relation_context på kanter är READ-ONLY. Inkludera ALDRIG relation_context i edge_enrichments.
    3. **LAKE-METADATA** — Uppdatera context_summary, relations_summary, document_keywords
       för varje dokument baserat på den berikade grafkontexten.
    4. **KVALITETSFLAGGOR** — Flagga noder med strukturella problem. Lägg till quality_flags på node_enrichments:
       - "possible_split": Nodens kontext innehåller distinkt olika kluster (t.ex. samma namn refererar till två olika personer, eller ett begrepp som blandar ihop två skilda saker).
       - "wrong_type": Nodens innehåll bryter mot sin typbeskrivning (t.ex. en teknisk modul klassad som Project, eller en roll klassad som Person).
       Inkludera flag_reason med en kort motivering per flagga. Flagga BARA vid tydliga problem — inte vid osäkerhet.

    ### SVARSFORMAT (STRIKT JSON)

    ```json
    {{
      "node_enrichments": [
        {{
          "node_id": "uuid",
          "updated_properties": {{"property_name": "value"}},
          "new_context": [{{"text": "...", "origin": "unit_id"}}],
          "new_aliases": ["existing_alias", "new_alias"],
          "quality_flags": ["possible_split"],
          "flag_reason": {{"possible_split": "Kort motivering"}},
          "confidence": 0.8,
          "reason": "Kort motivering"
        }}
      ],
      "edge_enrichments": [
        {{
          "source": "uuid",
          "target": "uuid",
          "edge_type": "ATTENDED",
          "updated_properties": {{"duration_minutes": 30}},
          "confidence": 0.8,
          "reason": "Kort motivering"
        }}
      ],
      "lake_updates": [
        {{
          "unit_id": "uuid",
          "context_summary": "Uppdaterad sammanfattning",
          "relations_summary": "Uppdaterad relationstext",
          "document_keywords": ["kw1", "kw2"]
        }}
      ]
    }}
    ```

    Returnera ENDAST JSON. Inga kommentarer utanför JSON-blocket.
    Utelämna tomma listor (om inga edge_enrichments, returnera inte nyckeln).

  # structural_prompt_v2: BORTTAGEN i OBJEKT-107 — ersatt av dreamer-promptar nedan

# --- Dreamer (Strukturell grafanalys, fas 3 i pipeline) ---
dreamer:
  merge_evaluation: |
    ## UPPGIFT: Är dessa noder samma entitet?

    Du ska avgöra om två noder i en kunskapsgraf representerar SAMMA verkliga entitet
    och bör slås samman (MERGE), eller om de är separata entiteter (SKIP).

    ### NOD A: "{name_a}" ({type_a})
    **Identitet (context_summary):**
    {context_a}

    **Kopplingar:**
    {edges_a}

    **Aliases:** {aliases_a}

    ### NOD B: "{name_b}" ({type_b})
    **Identitet (context_summary):**
    {context_b}

    **Kopplingar:**
    {edges_b}

    **Aliases:** {aliases_b}

    ### REGLER
    - Namnlikhet ensam räcker INTE för MERGE. Kontexten avgör.
    - Om namnen matchar MEN organisationer, roller eller kontext skiljer sig → SKIP
    - Om organisation OCH roll matchar → stark merge-signal
    - Om context_summary saknas på en nod men namnet är en del av den andres namn, och ingen motstridande kontext finns → svag merge-signal (lägre confidence)
    - Var konservativ: hellre SKIP med hög confidence än MERGE med låg confidence

    ### SVARSFORMAT (STRIKT JSON)

    ```json
    {{
      "decision": "MERGE" eller "SKIP",
      "confidence": 0.0-1.0,
      "primary_node": "Namn på noden som ska behållas (den med mest kontext)",
      "reason": "Kort motivering med specifik evidens"
    }}
    ```

    Returnera ENDAST JSON.

  rename_evaluation: |
    ## UPPGIFT: Bör denna nod byta namn?

    Du ska avgöra om en nod i en kunskapsgraf har ett ofullständigt eller felaktigt namn
    och bör byta namn (RENAME), eller om nuvarande namn är tillräckligt (SKIP).

    ### NODEN
    - **Aktuellt namn:** "{current_name}"
    - **Typ:** {node_type}
    - **Context_summary:** {context_summary}

    ### HEURISTISKT FÖRSLAG
    - **Föreslaget namn:** "{suggested_name}"
    - **Anledning:** {reason}

    ### RELATIONER
    {edges_text}

    ### REGLER
    - Om context_summary TYDLIGT identifierar personen med fullständigt namn → RENAME
    - Om context_summary är vag eller namnförslaget inte stämmer med kontext → SKIP
    - Det föreslagna namnet från heuristiken kan vara fel — LLM avgör det korrekta namnet
    - Om det finns motstridande information (t.ex. "Mikael" som kan vara flera personer) → SKIP
    - Var konservativ: hellre behåll nuvarande namn än byt till fel namn

    ### SVARSFORMAT (STRIKT JSON)

    ```json
    {{
      "decision": "RENAME" eller "SKIP",
      "new_name": "Det korrekta nya namnet (eller null om SKIP)",
      "confidence": 0.0-1.0,
      "reason": "Kort motivering med specifik evidens"
    }}
    ```

    Returnera ENDAST JSON.

  split_evaluation: |
    ## UPPGIFT: Blandar denna nod ihop flera entiteter?

    En nod har flaggats som potentiell sammanblandning av flera verkliga entiteter.
    Avgör om noden bör DELAS (SPLIT) eller behållas som den är (SKIP).

    ### NODEN
    - **Namn:** "{node_name}"
    - **Typ:** {node_type}
    - **Context_summary:** {context_summary}
    - **Aliases:** {aliases}

    ### NUMRERADE RELATIONER
    Varje relation har ett index [0], [1], [2]... som du MÅSTE referera till i context_indices.
    {edges_text}

    ### FLAGGORSAK
    {flag_reason}

    ### REGLER
    - SPLIT bara om det finns TYDLIGT motstridande kontext (t.ex. två helt olika roller/organisationer)
    - En person som byter jobb över tid är INTE en split-kandidat
    - En person med flera roller i SAMMA organisation är INTE en split-kandidat
    - Var konservativ: hellre behåll en nod med rik kontext än skapa fragmenterade noder

    ### SVARSFORMAT (STRIKT JSON)

    context_indices MÅSTE vara en lista med heltalsindex från NUMRERADE RELATIONER ovan.
    Varje relation ska tilldelas exakt ETT kluster. Utelämna inte relationer.

    ```json
    {{
      "decision": "SPLIT" eller "SKIP",
      "confidence": 0.0-1.0,
      "split_clusters": [
        {{"name": "Namn för entitet 1", "context_indices": [0, 2]}},
        {{"name": "Namn för entitet 2", "context_indices": [1, 3]}}
      ],
      "reason": "Kort motivering"
    }}
    ```

    Returnera ENDAST JSON.

  recategorize_evaluation: |
    ## UPPGIFT: Har denna nod fel typ?

    En nod har flaggats som potentiellt felkategoriserad.
    Avgör om noden bör BYTA TYP (RECATEGORIZE) eller behålla sin nuvarande typ (SKIP).

    ### NODEN
    - **Namn:** "{node_name}"
    - **Aktuell typ:** {current_type}
    - **Context_summary:** {context_summary}

    ### RELATIONER
    {edges_text}

    ### TILLÅTNA TYPER
    {allowed_types}

    ### FLAGGORSAK
    {flag_reason}

    ### REGLER
    - Ändra typ BARA om kontexten tydligt bryter mot definitionen för nuvarande typ
    - Den nya typen MÅSTE finnas i TILLÅTNA TYPER
    - Var konservativ: osäkerhet = behåll nuvarande typ

    ### SVARSFORMAT (STRIKT JSON)

    ```json
    {{
      "decision": "RECATEGORIZE" eller "SKIP",
      "new_type": "Ny typ (eller null om SKIP)",
      "confidence": 0.0-1.0,
      "reason": "Kort motivering"
    }}
    ```

    Returnera ENDAST JSON.